<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login Kasir</title>

    <style>
        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#2e7d32;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:350px;
            background:#ffffff;
            padding:40px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.2);
            text-align:center;
        }

        h2{
            color:#2c3e50;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#3498db;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>Aplikasi Kasir</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
